tf_publisher:
  ros__parameters:
    # topics and namespaces
    namespace: 'ego_racecar'
    scan_topic: '/scan'
    odom_topic: '/odom'
    drive_topic: '/drive'
    ekf_odom_topic: '/odometry/filtered'
    slam_map_topic: '/slam_map'
    
    # map parameters
    map_path: '/home/arcus/arcus/slam_map_saver/slam_maps/slam_map_20260314_130422.yaml'
    slam_maps_dir: '/home/arcus/arcus/slam_map_saver/slam_maps'
    map_img_ext: '.pgm'

    # ego starting pose on map
    sx: 0.0
    sy: 0.0
    stheta: 0.0

    # teleop
    kb_teleop: True

    #Use localization (EKF + AMCL)
    localize: True
    #Run slam + EKF
    run_slam: False #Overwrites localization if true

    run_ekf: True

    pure_pursuit: False

    disparity: False

