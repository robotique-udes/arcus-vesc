bridge:
  ros__parameters:
    # topics and namespaces
    ego_namespace: 'ego_racecar'
    ego_scan_topic: 'scan'
    ego_odom_topic: 'odom'
    
    # map parameters
    map_path: '/sim_ws/src/f1tenth_gym_ros/maps/levine'
    slam_maps_dir: '/sim_ws/src/arcus/slam_map_saver/slam_maps'
    map_img_ext: '.pgm'


    # ego starting pose on map
    sx: 0.0
    sy: 0.0
    stheta: 0.0

    # teleop
    kb_teleop: True

    #Use simulated localization (EKF + AMCL)
    use_sim_localization: True
    #Run slam
    run_slam: True #Overwrites localization if true
